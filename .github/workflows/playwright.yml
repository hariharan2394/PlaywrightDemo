name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        required: true
        description: Environment to run tests against
        type: choice
        options: [test, stage, prod]
        default: test

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'test' }}
      BASE_URL: ${{ vars.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------
      # Restore Allure history from gh-pages
      # -------------------------------
      - name: Restore Allure History
        run: |
          git fetch origin gh-pages || true
          git checkout gh-pages || true

          mkdir -p $GITHUB_WORKSPACE/allure-results/history

          HISTORY_DIR=history-${{ env.ENVIRONMENT }}

          if [ -d "$HISTORY_DIR" ]; then
            cp -r $HISTORY_DIR/* $GITHUB_WORKSPACE/allure-results/history/ || true
          fi

          git checkout $GITHUB_REF_NAME

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test
        continue-on-error: true

      # -------------------------------
      # Generate Allure report
      # -------------------------------

      - name: Add Allure Environment Info
        run: |
          mkdir -p allure-results
          echo "Run ID=${{ github.run_id }}" >> allure-results/environment.properties
          echo "Environment=${{ env.ENVIRONMENT }}" >> allure-results/environment.properties
          echo "Branch=${{ github.ref_name }}" >> allure-results/environment.properties
          echo "Commit=${{ github.sha }} | cut -c1-7" >> allure-results/environment.properties
          echo "Commit URL=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> allure-results/environment.properties
      
      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      # -------------------------------
      # Save Allure history back to gh-pages (keep last 20)
      # -------------------------------
      - name: Save Allure History
        if: always()
        run: |
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          HISTORY_DIR=history-${{ env.ENVIRONMENT }}
          mkdir -p $HISTORY_DIR
          if [ -d "$GITHUB_WORKSPACE/allure-report/history" ]; then
            cp -r $GITHUB_WORKSPACE/allure-report/history/* $HISTORY_DIR/
          fi
          cd $HISTORY_DIR
          ls -1t | tail -n +21 | xargs -r rm -f
          cd ..

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add $HISTORY_DIR
          git commit -m "Allure history | Run: ${{ github.run_id }} | Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }} | cut -c1-7" || echo "No changes"
          git push origin gh-pages

          git checkout $GITHUB_REF_NAME

      # -------------------------------
      # Upload Allure Report (THIS is what Pages serves)
      # -------------------------------
      - name: Upload Allure Report to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      # -------------------------------
      # Upload Playwright HTML Report (artifact)
      # -------------------------------
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4