name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        required: true
        description: Environment to run tests against
        type: choice
        options: [test, stage, prod]
        default: test

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'test' }}
      BASE_URL: ${{ vars.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    environment: ${{ github.event.inputs.environment || 'test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test

      # -----------------------------------
      # RESTORE ALLURE HISTORY (TRENDS)
      # -----------------------------------
      - name: Restore Allure History from gh-pages
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || exit 0
          mkdir -p allure-results/history

          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/* allure-results/history/ || true
          fi

      # -----------------------------------
      # GENERATE ALLURE REPORT
      # -----------------------------------
      - name: Generate Allure Report
        run: npx allure generate allure-results --clean -o allure-report

      # -----------------------------------
      # UPLOAD ALLURE REPORT FOR GITHUB PAGES
      # -----------------------------------
      - name: Upload Allure Report
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      # -----------------------------------
      # UPLOAD PLAYWRIGHT HTML REPORT (KEPT)
      # -----------------------------------
      - name: Upload Playwright HTML Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # -----------------------------------
  # DEPLOY LATEST ALLURE REPORT
  # -----------------------------------
  deploy:
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4