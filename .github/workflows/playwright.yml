name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        required: true
        description: Environment to run tests against
        type: choice
        options: [test, stage, prod]
        default: test

permissions:
  contents: write

jobs:
  # -----------------------------
  # JOB 1: Run Tests + Generate Report
  # -----------------------------
  test:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'test' }}
      BASE_URL: ${{ vars.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
    
    environment: ${{ github.event.inputs.environment || 'test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test

      # -----------------------------
      # RESTORE ALLURE HISTORY (LAST 20 RUNS)
      # -----------------------------
      - name: Restore Allure History from gh-pages
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || exit 0
          mkdir -p allure-results/history

          if [ -d gh-pages/allure ]; then
            cd gh-pages/allure
            ls -1t | head -n 20 | while read run; do
              if [ -d "$run/history" ]; then
                cp -r "$run/history/"* ../../allure-results/history/ || true
              fi
            done
          fi

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

  # -----------------------------
  # JOB 2: Deploy to GitHub Pages
  # -----------------------------
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # -----------------------------
      # CLEAN OLD REPORTS (KEEP LAST 20)
      # -----------------------------
      - name: Cleanup old reports (keep last 20)
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || exit 0

          if [ -d gh-pages/allure ]; then
            cd gh-pages/allure
            ls -1t | tail -n +21 | xargs -r rm -rf
          fi

      # -----------------------------
      # DEPLOY
      # -----------------------------
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: allure-report
          destination_dir: allure/${{ github.run_id }}