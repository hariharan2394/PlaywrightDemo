name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        required: true
        description: Environment to run tests against
        type: choice
        options: [test, stage, prod]
        default: test

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'test' }}
      BASE_URL: ${{ vars.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------
      # RESTORE HISTORY FROM gh-pages
      # -------------------------------------
      - name: Restore Allure history
        run: |
          git fetch origin gh-pages || true
          git checkout gh-pages || true

          mkdir -p ../allure-results/history

          if [ -d "history" ]; then
            cp -r history/* ../allure-results/history/ || true
          fi

          git checkout $GITHUB_REF_NAME

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test
        continue-on-error: true

      # -------------------------------------
      # GENERATE ALLURE REPORT
      # -------------------------------------
      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      # -------------------------------------
      # SAVE HISTORY (KEEP LAST 20)
      # -------------------------------------
      - name: Save Allure history (last 20)
        if: always()
        run: |
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          mkdir -p history

          # Copy latest run history
          if [ -d "../allure-report/history" ]; then
            cp -r ../allure-report/history/* history/
          fi

          # Keep only newest 20 history files
          cd history
          ls -1t | tail -n +21 | xargs -r rm -f
          cd ..

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add history
          git commit -m "Update Allure history (keep last 20)" || echo "No changes"
          git push origin gh-pages

          git checkout $GITHUB_REF_NAME

      # -------------------------------------
      # UPLOAD ALLURE REPORT
      # -------------------------------------
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      # -------------------------------------
      # KEEP PLAYWRIGHT REPORT
      # -------------------------------------
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4