name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 
    inputs:
      environment:
        required: true
        description: Environment agains which the test need to be executed
        type: choice
        options: [test, stage, prod]
        default: test
    
permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'test' }}
      #From Environment
      BASE_URL: ${{ vars.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    environment: ${{ github.event.inputs.environment || 'test' }}
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test

    - name: Download Previous History
      uses: actions/download-artifact@v4
      with:
        name: allure-history
        path: allure-history
      continue-on-error: true

    - name: Restore History
      run: |
        mkdir -p allure-results/history
        cp -r allure-history/* allure-results/history/ || true

    - name: Generate and Store Allure History
      run: npx allure generate allure-results --clean -o allure-report

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30

    - name: Deploy Allure Report to GitHub Pages (Unique Run)
      uses: peaceiris/actions-gh-pages@v4
      with:
        publish_dir: allure-report
        destination_dir: allure/${{ github.run_id }}

    - uses: actions/upload-artifact@v4
      with:
        name: allure-history
        path: allure-report/history
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30